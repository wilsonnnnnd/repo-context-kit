name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node (use Node 24 for npm 11)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Show tool versions
        run: |
          node -v
          npm -v

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test --if-present

      # 👉 只做 version + changelog（不 publish）
      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 👉 读取当前 package 信息
      - name: Read package info
        id: pkg
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      # 👉 检查是否已发布
      - name: Check if already published
        id: npm_check
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version > /dev/null 2>&1; then
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      # 👉 真正发布（OIDC）
      - name: Publish to npm (OIDC)
        if: steps.changesets.outputs.hasChangesets == 'false' && steps.npm_check.outputs.published == 'false'
        run: npm publish --provenance --access public

      # 👉 GitHub Release
      - name: Create GitHub Release
        if: steps.changesets.outputs.hasChangesets == 'false' && steps.npm_check.outputs.published == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: v${{ steps.pkg.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}